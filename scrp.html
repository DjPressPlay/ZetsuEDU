<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skool Scraper — ZetsuEDU</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black: #080808;
    --red: #c0392b;
    --red-dim: #7a1f16;
    --gold: #d4a843;
    --white: #f0ece4;
    --card: #141414;
    --border: #222;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 48px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; margin-bottom: 8px; }
  h1 span { color: var(--red); }
  .sub { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 36px; }
  button { background: var(--red); color: var(--white); border: none; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 12px 24px; cursor: pointer; }
  button:hover { background: var(--red-dim); }
  button.secondary { background: #1a1a1a; border: 1px solid var(--border); color: var(--gold); }
  button.secondary:hover { border-color: var(--gold); }
  .status { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #555; margin: 24px 0; min-height: 18px; }
  .status.ok { color: var(--gold); }
  .status.err { color: var(--red); }
  hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  .json-box { background: #0e0e0e; border: 1px solid var(--border); padding: 20px; font-family: 'Space Mono', monospace; font-size: 11px; color: #666; white-space: pre-wrap; max-height: 320px; overflow-y: auto; margin-bottom: 16px; }
  .posts-feed { display: flex; flex-direction: column; gap: 2px; max-width: 720px; margin-top: 32px; }
  .post-card { background: var(--card); border: 1px solid var(--border); padding: 24px 28px; display: block; }
  .post-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--red-dim); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--white); flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .post-author { font-size: 13px; font-weight: 600; color: var(--white); }
  .post-date-tag { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
  .post-tag { color: var(--gold); }
  .post-title { font-size: 16px; font-weight: 600; color: var(--white); margin-bottom: 8px; line-height: 1.35; }
  .post-preview { font-size: 13px; font-weight: 300; color: #777; line-height: 1.7; margin-bottom: 16px; }
  .post-footer { display: flex; align-items: center; justify-content: space-between; }
  .post-stats { font-family: 'Space Mono', monospace; font-size: 10px; color: #444; letter-spacing: 1px; }
  .empty-state { text-align: center; padding: 60px 0; color: #333; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .instructions { background: #0e0e0e; border: 1px solid var(--border); border-left: 3px solid var(--gold); padding: 16px 20px; margin-bottom: 28px; font-family: 'Space Mono', monospace; font-size: 11px; line-height: 1.8; color: #666; }
  .instructions strong { color: var(--gold); }
  @media (max-width: 640px) { body { padding: 20px; } }
</style>
</head>
<body>

<h1>Skool <span>Scraper</span></h1>
<div class="sub">ZetsuEDU — Post Feed Builder</div>

<div class="instructions">
  <strong>HOW IT WORKS:</strong><br/>
  Backpack scrapes posts from your live Skool feed automatically.<br/>
  Open this page on a Skool tab with Backpack active, then hit Load Posts.
</div>

<div class="row">
  <button onclick="loadPosts()">Load Posts</button>
  <button class="secondary" onclick="copyJSON()">Copy JSON</button>
  <button class="secondary" onclick="downloadJSON()">Download JSON</button>
</div>

<div class="status" id="status">Waiting...</div>

<hr/>

<div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:16px;">JSON Output</div>
<div class="json-box" id="json-output">// JSON will appear here after loading</div>

<hr/>

<div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:16px;">Preview</div>
<div class="posts-feed" id="posts-feed">
  <div class="empty-state">No posts loaded yet</div>
</div>

<script>
  let loadedPosts = [];

  // Listen for response back from content.js
  window.addEventListener('message', (e) => {
    if (!e.data || e.data.action !== 'zetsu_card2PostsResponse') return;

    const posts = e.data.posts;

    if (!posts || posts.length === 0) {
      setStatus('No posts in the Bag yet. Make sure Backpack is active on this Skool tab.', 'err');
      return;
    }

    loadedPosts = posts;
    renderJSON(posts);
    renderPosts(posts);
    setStatus('Loaded ' + posts.length + ' post(s) from the Bag.', 'ok');
  });

  function loadPosts() {
    setStatus('Requesting posts from Backpack...');
    window.postMessage({ action: 'zetsu_getCard2Posts' }, '*');

    // Timeout fallback if content.js doesn't respond
    setTimeout(() => {
      if (!loadedPosts.length) {
        setStatus('No response. Make sure Backpack is installed and active on this tab.', 'err');
      }
    }, 3000);
  }

  function renderJSON(posts) {
    document.getElementById('json-output').textContent = JSON.stringify(posts, null, 2);
  }

  function renderPosts(posts) {
    const feed = document.getElementById('posts-feed');
    if (!posts.length) {
      feed.innerHTML = '<div class="empty-state">No posts found</div>';
      return;
    }
    feed.innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-card-top">
          <div class="avatar">
            ${p.avatar ? `<img src="${p.avatar}" alt="${p.author}" />` : (p.author?.[0] || 'Z').toUpperCase()}
          </div>
          <div>
            <div class="post-author">${p.author}${p.badge ? ' · ' + p.badge : ''}</div>
            <div class="post-date-tag">${p.timeText || ''} &nbsp;·&nbsp; <span class="post-tag">ZetsuEDU</span></div>
          </div>
        </div>
        ${p.title ? `<div class="post-title">${p.title}</div>` : ''}
        ${p.body  ? `<div class="post-preview">${p.body.slice(0, 160)}...</div>` : ''}
        <div class="post-footer">
          <div class="post-stats">♥ ${p.likes || 0} &nbsp; 💬 ${p.comments || 0}</div>
        </div>
      </div>
    `).join('');
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function copyJSON() {
    navigator.clipboard.writeText(document.getElementById('json-output').textContent)
      .then(() => setStatus('JSON copied.', 'ok'));
  }

  function downloadJSON() {
    const blob = new Blob([document.getElementById('json-output').textContent], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'skool-posts.json';
    a.click();
  }
</script>

</body>
</html>

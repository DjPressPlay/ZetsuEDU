       BUILDER SHELL
    ============================================================ */
    *{box-sizing:border-box;margin:0;padding:0;}

    .topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;}
    .topbar-logo span{color:#c0392b;}
    .topbar-tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:#d4a843;text-transform:uppercase;}
    .topbar-actions{display:flex;gap:8px;}

    /* BUTTONS */
    .btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:8px 14px;background:transparent;color:#f0ece4;border:1px solid #333;cursor:pointer;transition:all 0.15s;}
    .btn:hover{border-color:#c0392b;color:#c0392b;}
    .btn.primary{background:#c0392b;border-color:#c0392b;color:#fff;}
    .btn.primary:hover{background:#7a1f16;border-color:#7a1f16;}
    .btn.success{background:#1a6b3a;border-color:#1a6b3a;color:#fff;}

    /* BODY LAYOUT */
    .builder-body{display:flex;flex:1;min-height:0;}

    /* LEFT PANEL */
    .left-panel{width:300px;flex-shrink:0;border-right:1px solid #222;overflow-y:auto;background:#0c0c0c;}

    /* SECTION ACCORDION */
    .sec{border-bottom:1px solid #1a1a1a;}
    .sec-head{padding:11px 16px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:#d4a843;text-transform:uppercase;background:#111;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
    .sec-head:hover{background:#161616;}
    .sec-body{padding:14px 16px;display:flex;flex-direction:column;gap:9px;}
    .sec-body.closed{display:none;}

    /* FORM FIELDS */
    .field{display:flex;flex-direction:column;gap:3px;}
    .field label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:#666;text-transform:uppercase;}
    .field input[type="text"],
    .field input[type="url"],
    .field textarea,
    .field select{width:100%;background:#141414;border:1px solid #2a2a2a;color:#f0ece4;font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;outline:none;transition:border-color 0.15s;}
    .field input:focus,.field textarea:focus{border-color:#c0392b;}
    .field textarea{resize:vertical;min-height:56px;}
    .field input[type="color"]{height:30px;padding:2px 4px;cursor:pointer;width:100%;}

    .crow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

    /* CARD FORM BLOCKS */
    .card-block{background:#141414;border:1px solid #1e1e1e;padding:10px;margin-bottom:6px;}
    .card-block:last-child{margin-bottom:0;}
    .card-block-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:8px;}
    .card-block .field{margin-bottom:5px;}
    .card-block .field:last-child{margin-bottom:0;}

    /* RIGHT PANEL */
    .right-panel{flex:1;display:flex;flex-direction:column;min-width:0;}
    .preview-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid #222;background:#0a0a0a;flex-shrink:0;}
    .preview-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:#555;text-transform:uppercase;}
    .preview-actions{display:flex;gap:6px;}
    .preview-frame{flex:1;border:none;background:#080808;}
    .preview-notice{font-family:'Space Mono',monospace;font-size:8px;color:#2a2a2a;padding:5px 16px;border-top:1px solid #111;background:#080808;flex-shrink:0;letter-spacing:2px;text-transform:uppercase;}

  <script>

    // ── ACCORDION TOGGLE ──────────────────────────────────────────
    function tog(head){
      const body = head.nextElementSibling;
      const icon = head.querySelector('span');
      body.classList.toggle('closed');
      icon.textContent = body.classList.contains('closed') ? '+' : '−';
    }

    // Close all sections on load
    document.querySelectorAll('.sec-body').forEach(b => b.classList.add('closed'));
    document.querySelectorAll('.sec-head span').forEach(s => s.textContent = '+');

    // ── FIELD VALUE HELPER ────────────────────────────────────────
    function v(id){ const el=document.getElementById(id); return el ? el.value : ''; }

    // ── SHADE COLOR HELPER ────────────────────────────────────────
    function shade(hex, pct){
      let n = parseInt(hex.replace('#',''), 16);
      let r = Math.min(255, Math.max(0, (n>>16) + (pct*2.55)|0));
      let g = Math.min(255, Math.max(0, ((n>>8)&0xff) + (pct*2.55)|0));
      let b = Math.min(255, Math.max(0, (n&0xff) + (pct*2.55)|0));
      return '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    }

    // ── SHOP CARD HTML ────────────────────────────────────────────
    function shopCard(name, desc, img, link){
      const imgHtml = img
        ? `<img src="${img}" alt="${name}" style="width:100%;aspect-ratio:1/1;object-fit:cover;display:block;border-bottom:1px solid var(--border);"/>`
        : `<div class="shop-img"></div>`;
      return `
        <a class="shop-card" href="${link||'#'}" target="_blank">
          ${imgHtml}
          <div class="shop-name">${name}</div>
          <div class="shop-desc">${desc}</div>
          <div class="shop-link">Get It →</div>
        </a>`;
    }

    // ── GENERATE FULL HTML ────────────────────────────────────────
    function generateHTML(){
      const red   = v('cRed');
      const gold  = v('cGold');
      const bg    = v('cBg');
      const card  = v('cCard');
      const white = v('cWhite');
      const redDim = shade(red, -30);

      const siteName   = v('siteName');
      const logoAccent = v('logoAccent');
      const logoBase   = siteName.replace(logoAccent, '');

      const shop1 = shopCard(v('sn1'), v('sd1'), v('si1'), v('sl1'));
      const shop2 = shopCard(v('sn2'), v('sd2'), v('si2'), v('sl2'));
      const shop3 = shopCard(v('sn3'), v('sd3'), v('si3'), v('sl3'));

      const gift1 = shopCard(v('gn1'), v('gd1'), v('gi1'), v('gl1'));
      const gift2 = shopCard(v('gn2'), v('gd2'), v('gi2'), v('gl2'));
      const gift3 = shopCard(v('gn3'), v('gd3'), v('gi3'), v('gl3'));

      return `<!DOCTYPE html>
<html lang="en">
<head>

  <style>

      --black:   ${bg};

      --red-dim: ${redDim};
      --gold:    ${gold};
      --white:   ${white};
      --card:    ${card};
      --border:  #222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
    }
    .logo span { color: var(--red); }

      font-family: 'Space Mono', monospace;

    /* AD BAR */
    .ad-bar {

      overflow: hidden;
      height: 200px;

    .main {

    .post-card-top { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--red-dim);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 13px;
      color: var(--white); flex-shrink: 0; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-author  { font-size: 12px; font-weight: 600; color: var(--white); }
    .post-time    { font-family: 'Space Mono', monospace; font-size: 9px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
    .post-title   { font-size: 13px; font-weight: 600; color: var(--white); line-height: 1.35; }
    .post-preview { font-size: 12px; font-weight: 300; color: #666; line-height: 1.65; flex: 1; }
    .post-footer  { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .post-read    { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--red); text-transform: uppercase; }
    .post-read::after { content: ' →'; }
    .post-stats   { display: flex; gap: 6px; }
    .stat         { font-family: 'Space Mono', monospace; font-size: 9px; padding: 3px 6px; border: 1px solid var(--border); color: #555; }
    .stat.likes   { color: #ff4f81; border-color: #ff4f8133; }
    .stat.comments{ color: var(--gold); border-color: #d4a84333; }
    .empty-state  { padding: 0 48px; color: #333; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }

    /* SHOP / GIFT GRID */
    .shop-grid {
      padding: 0 48px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .shop-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--white);
      transition: border-color 0.2s, transform 0.2s;
      padding-bottom: 16px;
    }
    .shop-card:hover { border-color: var(--red); transform: translateY(-2px); }
    .shop-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #1a1a1a;
      border-bottom: 1px solid var(--border);
    }
    .shop-name {
      font-size: 13px;
      font-weight: 600;
      padding: 0 14px;
      color: var(--white);
      line-height: 1.3;
    }
    .shop-desc {
      font-size: 11px;
      font-weight: 300;
      color: #666;
      padding: 0 14px;
      line-height: 1.6;
      flex: 1;
    }
    .shop-link {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--red);
      text-transform: uppercase;
      padding: 0 14px;
      margin-top: 4px;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .footer-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 4px;
      color: var(--white);
    }
    .footer-note {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #555;
      letter-spacing: 2px;
    }

    /* RESPONSIVE */
    @media (max-width: 860px) {
      .main      { flex-direction: column; }
      .hero      { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 36px 20px; }
      nav, footer{ padding-left: 20px; padding-right: 20px; }
      .section-header, .carousel-track, .empty-state, .shop-grid { padding-left: 20px; padding-right: 20px; }
      .shop-grid { grid-template-columns: 1fr; }
    }

  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="logo">${logoBase}<span>${logoAccent}</span></div>
    <div class="nav-tag">${v('navTag')}</div>
  </nav>

  <!-- TOP AD BAR -->
  <div class="ad-bar">
    <iframe src="${v('adTop')}" scrolling="no" frameborder="0"></iframe>
  </div>

  <!-- SECTION 1: HERO + POSTS CAROUSEL -->
  <div class="main">

    <section class="hero">
      <div class="hero-label">${v('heroLabel')}</div>
      <h1>${v('h1a')}<em>${v('h1b')}</em></h1>
      <p>${v('heroCopy')}</p>
      <a class="cta" href="${v('ctaLink')}" target="_blank">${v('ctaText')}</a>
    </section>

    <div class="posts-col">
      <div class="section-header">
        <div class="section-title">Latest Posts</div>
        <div class="section-count" id="post-count">0 ENTRIES</div>
      </div>
      <div class="carousel-container">
        <div class="carousel-track" id="posts-feed">
          <div class="empty-state">No posts yet — check back soon</div>
        </div>
      </div>
    </div>

  </div>

  <!-- SECTION 2: NEWSLETTER + SHOP + GIFT BOX -->
  <div class="main">

    <section class="hero">
      <div class="hero-label">${v('nlLabel')}</div>
      <h1>${v('nla')}<em>${v('nlb')}</em></h1>
      <div class="substack-post-embed">
        <p lang="en">${v('nlTitle')}</p>
        <p>${v('nlDesc')}</p>
        <a data-post-link href="${v('nlLink')}">Read on Substack</a>
      </div>
      <script async src="https://substack.com/embedjs/embed.js" charset="utf-8"><\/script>
    </section>

    <div class="posts-col">

      <!-- SHOP -->
      <div class="section-header">
        <div class="section-title">Shop</div>
        <div class="section-count">3 ITEMS</div>
      </div>
      <div class="shop-grid">
        ${shop1}
        ${shop2}
        ${shop3}
      </div>

      <!-- FREE GIFT BOX -->
      <div class="section-header" style="margin-top: 48px;">
        <div class="section-title">Free Gift Box</div>
        <div class="section-count">3 ITEMS</div>
      </div>
      <div class="shop-grid">
        ${gift1}
        ${gift2}
        ${gift3}
      </div>

    </div>

  </div>

  <!-- BOTTOM AD BAR -->
  <div class="ad-bar">
    <iframe src="${v('adBot')}" scrolling="no" frameborder="0"></iframe>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-brand">${v('footerBrand')}</div>
    <div class="footer-note">${v('footerNote')}</div>
  </footer>

  <!-- SUPABASE POSTS LOADER -->
  <script>

    const SUPABASE_URL = '${v('sbUrl')}';
    const SUPABASE_KEY = '${v('sbKey')}';
    const TABLE        = '${v('sbTable')}';

    async function loadFromSupabase() {
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/' + TABLE + '?order=scraped_at.desc&limit=20', {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY
          }
        });
        const data = await res.json();
        if (Array.isArray(data) && data.length) {
          renderPosts(data.map(row => ({
            link:     row.link,
            avatar:   row.avatar,
            author:   row.author,
            badge:    row.badge,
            timeText: row.time_text,
            title:    row.title,
            body:     row.body,
            likes:    row.likes,
            comments: row.comments
          })));
        }
      } catch (e) {
        console.error('Supabase load error:', e);
      }
    }

    function renderPosts(posts) {
      const feed  = document.getElementById('posts-feed');
      const count = document.getElementById('post-count');
      if (!posts.length) {
        feed.innerHTML = '<div class="empty-state">No posts yet — check back soon</div>';
        count.textContent = '0 ENTRIES';
        return;
      }
      count.textContent = posts.length + (posts.length === 1 ? ' ENTRY' : ' ENTRIES');
      const cards = posts.map(p => \`
        <a class="post-card" href="\${p.link || '#'}" target="_blank">
          <div class="post-card-top">
            <div class="avatar">
              \${p.avatar ? '<img src="' + p.avatar + '" alt="' + p.author + '" />' : (p.author?.[0] || 'Z').toUpperCase()}
            </div>
            <div>
              <div class="post-author">\${p.author || ''}\${p.badge ? ' · ' + p.badge : ''}</div>
              <div class="post-time">\${p.timeText || ''}</div>
            </div>
          </div>
          \${p.title ? '<div class="post-title">' + p.title + '</div>' : ''}
          \${p.body  ? '<div class="post-preview">' + p.body.slice(0, 100) + '...</div>' : ''}
          <div class="post-footer">
            <div class="post-read">Read Post</div>
            <div class="post-stats">
              <div class="stat likes">♥ \${p.likes || 0}</div>
              <div class="stat comments">💬 \${p.comments || 0}</div>
            </div>
          </div>
        </a>
      \`).join('');
      const shouldLoop = posts.length >= 3;
      feed.innerHTML = shouldLoop ? cards + cards : cards;
      if (shouldLoop) {
        const totalWidth = posts.length * 252;
        feed.style.setProperty('--scroll-distance', '-' + totalWidth + 'px');
        feed.style.setProperty('--scroll-duration', posts.length * 4 + 's');
        feed.classList.add('animated');
      }
    }

    loadFromSupabase();

  <\/script>

</body>
</html>`;
    }

    // ── DEBOUNCE RENDER ───────────────────────────────────────────
    let timer = null;
    function debounce(){ clearTimeout(timer); timer = setTimeout(render, 400); }

    function render(){
      const html = generateHTML();
      const iframe = document.getElementById('preview');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open(); doc.write(html); doc.close();
    }

    // ── COPY ──────────────────────────────────────────────────────
    function copyHTML(){
      const btn = document.getElementById('copyBtn');
      navigator.clipboard.writeText(generateHTML()).then(()=>{
        btn.textContent = '✓ Copied!';
        btn.classList.add('success');
        setTimeout(()=>{ btn.textContent = 'Copy HTML'; btn.classList.remove('success'); }, 2000);
      });
    }

    // ── DOWNLOAD ──────────────────────────────────────────────────
    function downloadHTML(){
      const name = (v('siteName') || 'zetsu-site').toLowerCase().replace(/\s+/g, '-') + '.html';
      const blob = new Blob([generateHTML()], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
    }

    // ── INIT ──────────────────────────────────────────────────────
    render();

  </script>
</body>
</html>

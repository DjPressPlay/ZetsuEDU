<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zetsu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    width: 100%;
    overflow: hidden;
  }
  .ad-wrapper {
    width: 100%;
    height: 100px;
    overflow: hidden;
    position: relative;
  }
  .gz-banner {
    width: 100%;
    height: 100px;
    border: none;
    display: block;
  }
</style>
</head>
<body>
<div class="ad-wrapper">
  <iframe
    class="gz-banner"
    src="https://11220.play.gamezop.com/"
    scrolling="no"
    allowfullscreen
  ></iframe>
</div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>

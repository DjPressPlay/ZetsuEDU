<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zetsu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(180,140,60,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,140,60,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .corner {
    position: fixed;
    width: 18px;
    height: 18px;
    border-color: rgba(180,140,60,0.4);
    border-style: solid;
  }
  .corner-tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  .wordmark {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(180,140,60,0.35);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .ad-wrapper {
    position: relative;
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  .scan-line {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,140,60,0.15), transparent);
    animation: scan 6s linear infinite;
    pointer-events: none;
  }

  @keyframes scan {
    0% { top: 0; }
    100% { top: 100vh; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scan-line"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<span class="wordmark">Zetsumetsu Corporation</span>

<div class="ad-wrapper">
  <script src="https://quge5.com/88/tag.min.js" data-zone="234236" async data-cfasync="false"></script>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>

</body>
</html>
